name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Restore
        run: dotnet restore src/GMDFAutoDocumentationBuilder/GMDFAutoDocumentationBuilder.csproj

      - name: Build
        run: dotnet build src/GMDFAutoDocumentationBuilder/GMDFAutoDocumentationBuilder.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/GMDFAutoDocumentationBuilder.Tests/GMDFAutoDocumentationBuilder.Tests.csproj --verbosity normal

      - name: Package mod for Mods folder
        run: |
          mkdir -p release/GMDFAutoDocumentationBuilder
          cp src/GMDFAutoDocumentationBuilder/bin/Release/net6.0/GMDFAutoDocumentationBuilder.dll release/GMDFAutoDocumentationBuilder/
          cp src/GMDFAutoDocumentationBuilder/manifest.json release/GMDFAutoDocumentationBuilder/
          cd release
          zip -r ../GMDFAutoDocumentationBuilder.zip GMDFAutoDocumentationBuilder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GMDFAutoDocumentationBuilder
          path: GMDFAutoDocumentationBuilder.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: GMDFAutoDocumentationBuilder.zip
          generate_release_notes: true
